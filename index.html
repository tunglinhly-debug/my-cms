<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My CMS</title>
<style>
body{
    font-family:Arial;
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.header{
    text-align:center;
    padding:30px;
}
.logo{
    max-width:120px;
    max-height:120px;
}
.footer{
    text-align:center;
    padding:20px;
    margin-top:50px;
    border-top:1px solid #ddd;
}
.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}
img{
    width:100%;
    border-radius:10px;
}
iframe{
    width:100%;
    height:500px;
}
</style>
</head>
<body>
<div id="header"></div>
<div id="app"></div>
<div id="footer"></div>
<script>
const API = "https://script.google.com/macros/s/AKfycbyhnsI16x9MLhiYHTcUe_Z_-aeC4F1h2KqLdzOHnc6V7dmSTzX7XPIQpnRy0TlR1DTe/exec";
fetch(API)
.then(res => res.json())
.then(data => {
    let html = "";
    data.reverse().forEach(item => {
        html += `<div class="card">`;
        html += `<h2>${item.title}</h2>`;
        html += `<small>${item.date}</small>`;
        if(item.type === "text"){
            html += `<p>${item.content}</p>`;
        }
        if(item.type === "image"){
            html += `<p><img src="${item.media}"></p>
                     <p>${item.content}</p>`;
        }
        if(item.type === "video"){
            html += `<p><video width="500" height="300" controls>
                     <source src="${item.media}" type="video/mp4">^_^</video></p>`;
        }
        if(item.type === "link"){
            html += `<p><a href="${item.link}"target="_blank">Open link</a></p>`;
        }
        // html += `<p><a href="detail.html?id=${item.id}">Xem chi tiết</a></p>`;
        html += `</div>`;
    });
    document.getElementById("app").innerHTML = html;
});

fetch(API)
.then(r => r.json())
.then(data => {
    const config = data.config;
    document.getElementById("header").innerHTML = `<div class="header">
                                                      <img src="${config.Logo}" class="logo">
                                                      <h1>${config.SiteName}</h1>
                                                      <p>${config.HeroText}</p>
                                                    </div>`;
    });
    
document.getElementById("footer").innerHTML = `<div class="footer">${config.Footer}</div>`;
</script>
</body>
</html>

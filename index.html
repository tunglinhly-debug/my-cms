<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My CMS</title>
<style>
body{
    font-family:Arial;
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}
img{
    width:100%;
    border-radius:10px;
}
iframe{
    width:100%;
    height:500px;
}
</style>
</head>
<body>
<h1>My Content</h1>
<button data-cat="All">Tất cả</button>
<button data-cat="Blog">Blog</button>
<button data-cat="Album">Album</button>
<button data-cat="Video">Video</button>
<button data-cat="Music">Music</button>
<button data-cat="PDF">PDF</button>
<script>
    item.category === selectedCategory
</script>
<input id="searchBox" placeholder="Tìm kiếm...">
<script>
    searchBox.addEventListener("input", () => {
    const keyword =
      searchBox.value.toLowerCase();
    render(
      allData.filter(item =>
        item.title.toLowerCase().includes(keyword)
        ||
        item.content.toLowerCase().includes(keyword)
      )
    );
});
</script>
<img src="a.jpg">
<img src="b.jpg">
<img src="c.jpg">
<script>
    const images =
item.media.split("|");
</script>
<audio controls>
    <source src="link.mp3" type="audio/mpeg">
</audio>
<a href="file.pdf" target="_blank">Mở PDF</a>
<a href="detail.html?id=4">Xem chi tiết</a>
<script>
    html += `<a href="detail.html?id=${item.id}">Xem chi tiết</a>`;
</script>
<div id="app"></div>
<script>
const API = "https://script.google.com/macros/s/AKfycbyhnsI16x9MLhiYHTcUe_Z_-aeC4F1h2KqLdzOHnc6V7dmSTzX7XPIQpnRy0TlR1DTe/exec";
fetch(API)
.then(res => res.json())
.then(data => {
    let html = "";
    data.reverse().forEach(item => {
        html += `<div class="card">`;
        html += `<h2>${item.title}</h2>`;
        html += `<small>${item.date}</small>`;
        if(item.type === "text"){
            html += `<p>${item.content}</p>`;
            html += `<a href="detail.html?id=${item.id}">Xem chi tiết</a>`;
        }
        if(item.type === "image"){
            html += `<img src="${item.media}"><p>${item.content}</p>`;
            html += `<a href="detail.html?id=${item.id}">Xem chi tiết</a>`;
        }
        if(item.type === "video"){
            html += `<iframe src="${item.media}" frameborder="0" allowfullscreen></iframe>`;
            html += `<a href="detail.html?id=${item.id}">Xem chi tiết</a>`;
        }
        if(item.type === "link"){
            html += `<a href="${item.link}"target="_blank">Open link</a>`;
            html += `<a href="detail.html?id=${item.id}">Xem chi tiết</a>`;
        }
        html += `</div>`;
    });
    document.getElementById("app").innerHTML = html;
});
</script>
</body>
</html>

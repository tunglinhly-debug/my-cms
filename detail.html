<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My CMS</title>
<style>
body{
    font-family:Arial;
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}
img{
    width:100%;
    border-radius:10px;
}
iframe{
    width:100%;
    height:500px;
}
</style>
</head>
<body>
<h1>My Content</h1>
<div id="app"></div>
<script>
const API = "https://script.google.com/macros/s/AKfycbyhnsI16x9MLhiYHTcUe_Z_-aeC4F1h2KqLdzOHnc6V7dmSTzX7XPIQpnRy0TlR1DTe/exec";
fetch(API)
.then(res => res.json())
.then(data => {
    let html = "";
    data.reverse().forEach(item => {
        html += `<div class="card">`;
        html += `<h2>${item.title}</h2>`;
        html += `<small>${item.date}</small>`;
        if(item.type === "text"){
            html += `<p>${item.content}</p>`;
        }
        if(item.type === "image"){
            html += `
            <img src="${item.media}">
            <p>${item.content}</p>
            `;
        }
        if(item.type === "video"){
            html += `<iframe src="${item.media}" frameborder="0" allowfullscreen></iframe>`;
        }
        if(item.type === "link"){
            html += `<a href="${item.link}" target="_blank">Open link</a>`;
        }
        html += `</div>`;
    });
    document.getElementById("app")
        .innerHTML = html;
});
</script>
</body>
</html>
